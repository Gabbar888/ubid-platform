services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ubid
      POSTGRES_USER: ubid
      POSTGRES_PASSWORD: ubid_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubid -d ubid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OpenSearch ───────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.16.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.16.0
    restart: unless-stopped
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # ── Neo4j ────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.24-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/ubid_neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ── Kafka (KRaft mode, no Zookeeper) ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    restart: unless-stopped
    hostname: kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy

  # ── UBID API ─────────────────────────────────────────────────────────────────
  ubid-api:
    build: .
    restart: unless-stopped
    command: uvicorn ubid.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./migrations:/app/migrations
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── UBID Worker (Kafka consumer) ──────────────────────────────────────────────
  ubid-worker:
    build: .
    restart: unless-stopped
    command: python -m ubid.kafka.consumer
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Self-hosted Nominatim (OPTIONAL — uncomment to enable full geocoding) ────
  # The platform geocodes addresses via:
  #   1. data/dictionaries/locality_coordinates.json (~70 entries, instant)
  #   2. Nominatim (this service) for addresses not in the dictionary.
  #
  # To enable Nominatim:
  #   1. Download a Karnataka or India OSM extract:
  #        https://download.geofabrik.de/asia/india/karnataka.html  (~250 MB)
  #        https://download.geofabrik.de/asia/india.html            (~5 GB)
  #   2. Place the .osm.pbf file at ./nominatim_data/karnataka-latest.osm.pbf
  #   3. Uncomment the block below.
  #   4. Set NOMINATIM_URL=http://nominatim:8080 in .env
  #   5. docker compose up -d nominatim ubid-api
  # First-time import takes ~10-30 minutes depending on the extract size.
  #
  nominatim:
    image: mediagis/nominatim:4.4
    restart: unless-stopped
    environment:
      PBF_PATH: /nominatim/data/karnataka-latest.osm.pbf
      IMPORT_WIKIPEDIA: "false"
      NOMINATIM_PASSWORD: ubid_nominatim_secret
    volumes:
      - ./nominatim_data:/nominatim/data
      - nominatim_db:/var/lib/postgresql/14/main
    ports:
      - "8090:8080"
    shm_size: 1gb

  # ── Reviewer Console (Streamlit) ──────────────────────────────────────────────
  ubid-frontend:
    build: .
    restart: unless-stopped
    command: streamlit run frontend/reviewer_console.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      API_BASE_URL: http://ubid-api:8000
    volumes:
      - ./frontend:/app/frontend
      - ./src:/app/src
    ports:
      - "8501:8501"
    depends_on:
      - ubid-api

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  neo4j_data:
  neo4j_logs:
  kafka_data:
  nominatim_db:
